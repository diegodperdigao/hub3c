<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workflow 3C | Projeto MD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #030008;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* FUNDO E EFEITOS */
        .bg-fluid {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 80% 20%, rgba(255, 0, 127, 0.06) 0%, transparent 50%),
                        radial-gradient(circle at 20% 80%, rgba(106, 13, 173, 0.08) 0%, transparent 50%);
        }

        .bg-noise {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.04; 
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* MOSAICO INFINITO REAL */
        .mosaic-wrapper {
            position: absolute; 
            top: -15%; left: -5%; right: -5%; bottom: -15%; 
            overflow: hidden; 
            z-index: 0; 
            pointer-events: none; 
            -webkit-mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0px, black 15%, black 85%, transparent 100%);
            opacity: 0.22;
        }
        
        .mosaic-container {
            position: absolute; inset: 0; width: 110%; height: 110%;
            transform: perspective(1000px) rotateX(15deg) rotateY(-5deg) rotateZ(2deg);
        }
        
        .mosaic-pattern {
            width: 100%; height: 100%;
            background-image: url('https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg');
            background-size: 100px;
            background-repeat: repeat;
            animation: panMosaic 60s linear infinite;
        }

        @keyframes panMosaic {
            from { background-position: 0px 0px; }
            to { background-position: -200px -200px; }
        }

        .glass-header {
            background: rgba(5, 5, 10, 0.95);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.6);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .command-input:focus {
            border-color: rgba(236, 72, 153, 0.4);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
        }

        .command-input::placeholder {
            color: #a1a1aa !important; 
            opacity: 1;
        }

        /* PRIORIDADES */
        .priority-high-border { border-left: 4px solid #f43f5e; }
        .priority-medium-border { border-left: 4px solid #a855f7; }
        .priority-low-border { border-left: 4px solid #06b6d4; }

        .tag-high { background: rgba(244, 63, 94, 0.15); color: #f43f5e; border: 1px solid rgba(244, 63, 94, 0.2); }
        .tag-medium { background: rgba(168, 85, 247, 0.15); color: #a855f7; border: 1px solid rgba(168, 85, 247, 0.2); }
        .tag-low { background: rgba(6, 182, 212, 0.15); color: #06b6d4; border: 1px solid rgba(6, 182, 212, 0.2); }

        .completed-task { opacity: 0.3; filter: grayscale(1); }
        .completed-text { text-decoration: line-through; color: #71717a; }

        /* STATUS DE TEMPO (HEAT MAP) */
        .status-fresh { color: #22d3ee; }
        .status-stale { color: #fbbf24; }
        .status-critical { color: #f472b6; animation: pulseGlow 2s infinite; }

        @keyframes pulseGlow {
            0%, 100% { opacity: 1; filter: drop-shadow(0 0 2px rgba(244, 114, 182, 0.5)); }
            50% { opacity: 0.7; filter: drop-shadow(0 0 8px rgba(244, 114, 182, 0.8)); }
        }

        /* RAMIFICAÇÕES */
        .branch-line {
            position: absolute; left: -24px; top: -16px; bottom: 16px; width: 1px;
            background: rgba(255, 255, 255, 0.1);
        }
        .branch-node {
            position: absolute; left: -24px; top: 15px; width: 12px; height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .animate-task { animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CALENDÁRIO COM ICON CENTRALIZADO VERTICALMENTE NO INPUT */
        .reminder-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        input[type="datetime-local"] {
            padding-right: 45px !important;
            width: 100%;
        }

        input[type="datetime-local"]::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0;
            color: transparent;
            cursor: pointer;
            height: auto;
            left: 0;
            position: absolute;
            right: 0;
            top: 0;
            width: auto;
            z-index: 10;
        }
        
        .reminder-wrapper::after {
            content: '📅';
            position: absolute;
            right: 15px;
            pointer-events: none;
            opacity: 0.4;
            font-size: 14px;
            transition: opacity 0.3s ease;
        }

        /* ANIMAÇÃO ERRO SENHA */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .shake { animation: shake 0.2s ease-in-out 0s 2; border-color: #ef4444 !important; }

        button svg { pointer-events: none; } 
    </style>
</head>
<body class="antialiased selection:bg-pink-500 selection:text-white">
    <div class="bg-fluid"></div>
    <div class="bg-noise"></div>

    <!-- TELA DE BLOQUEIO -->
    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#030008] transition-opacity duration-700">
        <div class="max-w-md w-full px-10 text-center">
            <div class="mb-8 flex flex-col items-center">
                <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" alt="3C" class="h-16 w-16 rounded-full object-cover border-2 border-white/10 mb-6">
                <h2 class="text-[10px] font-black tracking-[0.4em] uppercase text-gray-400 italic">inicie a sessão</h2>
            </div>
            <div class="glass-card p-10 rounded-3xl border border-white/10 shadow-2xl">
                <div class="space-y-6">
                    <input type="password" id="password-input" placeholder="••••••••" 
                        onkeypress="if(event.key === 'Enter') checkPassword()"
                        class="w-full bg-black/40 border border-white/10 px-6 py-5 rounded-2xl text-center text-white focus:outline-none focus:border-pink-500 transition-all tracking-widest font-mono">
                    <button onclick="checkPassword()" class="w-full bg-white text-black font-black uppercase text-[10px] tracking-[0.3em] py-5 rounded-2xl hover:bg-pink-500 hover:text-white transition-all duration-300 active:scale-95">
                        Acessar Workflow
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="main-content" class="hidden opacity-0 transition-opacity duration-1000">
        <!-- NAVBAR FIXA -->
        <nav class="fixed w-full z-50 top-0 glass-header">
            <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r from-transparent via-pink-500 to-transparent opacity-30"></div>
            <div class="max-w-[1400px] mx-auto px-8 py-4 flex justify-between items-center text-white">
                <div class="flex items-center gap-5">
                    <img src="https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg" alt="3C" class="h-9 w-9 rounded-full border border-white/10 p-0.5 shadow-2xl">
                    <div class="flex flex-col text-left">
                        <span class="text-[0.75rem] tracking-[0.4em] uppercase text-white font-black leading-tight">PROJETO MD</span>
                        <span class="text-[0.5rem] tracking-[0.2em] uppercase text-gray-500 font-bold italic opacity-80 uppercase">3C_Execution_Control</span>
                    </div>
                </div>
                <div id="connection-status" class="flex items-center gap-3 px-4 py-2 bg-white/5 rounded-xl border border-white/5">
                    <div id="status-dot" class="w-1.5 h-1.5 rounded-full bg-gray-500"></div>
                    <span id="user-id-text" class="text-[8px] font-black text-gray-400 tracking-widest uppercase italic">Secure Connection...</span>
                </div>
            </div>
        </nav>

        <div class="max-w-[1400px] mx-auto px-8 pt-24 pb-12 relative text-white">
            
            <!-- TAGLINE ESTRATÉGICA -->
            <div class="mt-8 mb-8 ml-4">
                <p class="font-mono text-[9px] text-gray-400 tracking-[0.4em] uppercase flex items-center gap-4">
                    <span class="w-12 h-[2px] bg-gradient-to-r from-pink-500 via-purple-500 to-cyan-500"></span> 
                    Strategy_Creative_Production_Bizdev
                </p>
            </div>

            <!-- HEADER PRINCIPAL -->
            <header class="mb-16 relative overflow-hidden rounded-3xl bg-white/[0.01] border border-white/[0.03] shadow-2xl flex items-center min-h-[280px]">
                <div class="mosaic-wrapper">
                    <div class="mosaic-container">
                        <div class="mosaic-pattern"></div>
                    </div>
                </div>
                
                <div class="relative z-10 w-full px-12 py-10 flex flex-col md:flex-row justify-between items-center gap-12 text-white">
                    <div class="max-w-2xl text-center md:text-left flex-shrink-0">
                        <h1 class="text-7xl lg:text-8xl font-black tracking-tighter uppercase leading-none text-white whitespace-nowrap">
                            Workflow <span class="text-pink-500">3C</span>
                        </h1>
                    </div>
                    
                    <div class="bg-black/85 p-8 rounded-2xl border border-white/10 min-w-[340px] backdrop-blur-xl shadow-2xl text-white">
                        <div class="flex items-center justify-between mb-4">
                            <p id="stats-text" class="text-[9px] font-black text-gray-400 uppercase tracking-[0.3em]">Efficiency_Report</p>
                            <span id="percent-display" class="text-[10px] font-black text-pink-500">0%</span>
                        </div>
                        <div class="h-1.5 w-full bg-black/50 rounded-full overflow-hidden border border-white/5">
                            <div id="overall-progress" class="h-full bg-gradient-to-r from-pink-500 via-purple-600 to-emerald-500 transition-all duration-1000 shadow-[0_0_15px_rgba(236,72,153,0.3)]" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </header>

            <!-- COMMAND CENTER (FORMULÁRIO INTEGRADO) -->
            <div class="glass-card p-1 rounded-3xl mb-16 shadow-[0_30px_60px_rgba(0,0,0,0.7)] overflow-hidden">
                <div class="bg-[#050508]/95 p-10 rounded-3xl">
                    <div class="space-y-8">
                        <!-- LINHA 1: AÇÃO + PRIORIDADE -->
                        <div class="flex flex-col lg:flex-row items-stretch gap-5">
                            <div class="flex-grow flex flex-col gap-3">
                                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 ml-2 italic">Ação Principal</label>
                                <input type="text" id="main-task-input" placeholder="O que vamos criar hoje?" 
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-6 py-6 text-white focus:outline-none command-input transition-all font-bold tracking-tight text-xl h-[72px]">
                            </div>
                            
                            <div class="min-w-[200px] flex flex-col gap-3">
                                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 ml-2 italic">Prioridade</label>
                                <div class="relative h-[72px]">
                                    <select id="priority-select" class="w-full h-full appearance-none bg-black/40 border border-white/10 rounded-xl px-6 text-xs font-black uppercase text-gray-400 focus:outline-none cursor-pointer hover:border-white/20 transition-all">
                                        <option value="high">HIGH</option>
                                        <option value="medium" selected>MEDIUM</option>
                                        <option value="low">LOW</option>
                                    </select>
                                    <i data-lucide="chevron-down" class="absolute right-5 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-600 pointer-events-none"></i>
                                </div>
                            </div>
                        </div>
                        
                        <!-- LINHA 2: CONTEXTO + AGENDAMENTO -->
                        <div class="flex flex-col lg:flex-row items-stretch gap-6">
                            <div class="flex-grow flex flex-col gap-3">
                                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 ml-2 italic">Contexto Estratégico</label>
                                <textarea id="main-desc-input" placeholder="Detalhes estratégicos, links de referência e metas da missão..." 
                                    class="w-full bg-black/40 border border-white/10 rounded-xl px-6 py-5 text-base text-white focus:outline-none command-input transition-all min-h-[140px] resize-none"></textarea>
                            </div>
                            
                            <div class="min-w-[300px] flex flex-col gap-3">
                                <label class="text-[9px] font-black uppercase tracking-widest text-gray-500 ml-2 italic">Agendar Push Notification</label>
                                <div class="reminder-wrapper flex-grow">
                                    <input type="datetime-local" id="reminder-input" 
                                        class="bg-black/40 border border-white/10 rounded-xl px-6 py-5 text-sm font-bold text-white focus:outline-none focus:border-pink-500 transition-all w-full h-full cursor-pointer">
                                </div>
                            </div>
                        </div>

                        <!-- LINHA 3: BOTÃO EXPANDIDO (FULL WIDTH) -->
                        <div class="pt-4">
                            <button onclick="addMainTask()" class="w-full btn-launch bg-white text-black font-black uppercase text-[11px] tracking-[0.4em] rounded-xl hover:bg-pink-500 hover:text-white active:scale-[0.99] transition-all h-[72px] shadow-2xl">
                                Criar Tarefa
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="flex flex-wrap justify-between items-center gap-8 mb-12 border-b border-white/5 pb-8 text-white">
                <div class="flex gap-12 text-[11px] font-black uppercase tracking-[0.3em] text-gray-600">
                    <button onclick="setFilter('all')" class="hover:text-pink-500 transition-all filter-btn active-filter text-pink-500 relative">
                        Visão Geral <span class="absolute -bottom-9 left-0 right-0 h-[3px] bg-pink-500 rounded-full"></span>
                    </button>
                    <button onclick="setFilter('pending')" class="hover:text-pink-500 transition-all filter-btn relative">Pendentes</button>
                    <button onclick="setFilter('completed')" class="hover:text-pink-500 transition-all filter-btn relative">Finalizadas</button>
                </div>
                <div class="flex items-center gap-4 text-[10px] font-bold text-gray-600 uppercase tracking-widest italic opacity-60">
                    <span id="sync-status">Cloud Sync Ready</span>
                    <div class="w-1.5 h-1.5 rounded-full bg-gray-800"></div>
                    <span id="sync-time">---</span>
                </div>
            </div>

            <!-- LISTA DE TAREFAS -->
            <div id="task-list" class="space-y-10 min-h-[400px]">
                <div class="glass-card h-36 rounded-3xl opacity-5"></div>
            </div>

            <!-- ESTADO VAZIO -->
            <div id="empty-state" class="hidden text-center py-40 opacity-10">
                <div class="inline-block p-10 rounded-full border-2 border-dashed border-white/20 mb-8">
                    <i data-lucide="check-circle-2" class="w-20 h-20 mx-auto"></i>
                </div>
                <p class="text-3xl font-black uppercase tracking-[0.5em]">Sem pendências</p>
            </div>
        </div>

        <!-- RODAPÉ INSTITUCIONAL -->
        <footer class="py-16 bg-black border-t border-white/5 text-center mt-20 relative z-10">
            <img src="https://i.ibb.co/chfw0cND/Horizontal-Com-Tag-W.png" alt="3C" class="h-10 mx-auto opacity-70 mb-6 grayscale hover:grayscale-0 transition-all duration-700">
            <p class="text-[10px] text-gray-600 uppercase tracking-[0.3em] font-bold mb-2 text-white">Confidencial &copy; 2026 3C Gaming BizDev</p>
            <p class="text-[8px] text-gray-700 uppercase tracking-[0.1em] italic opacity-40">Workflow Management System v1.8.8</p>
        </footer>
    </div>

    <!-- TOAST NOTIFICATION -->
    <div id="toast" class="fixed bottom-12 right-12 transform translate-y-40 opacity-0 transition-all duration-700 z-[200]">
        <div class="glass-card px-8 py-6 rounded-2xl border-l-4 border-pink-500 flex items-center gap-6 shadow-2xl backdrop-blur-2xl">
            <div class="p-3 bg-pink-500 rounded-full text-white"><i data-lucide="zap" class="w-5 h-5"></i></div>
            <div>
                <p id="toast-msg" class="text-[11px] font-black uppercase tracking-[0.2em] text-white"></p>
                <p class="text-[9px] text-gray-500 uppercase tracking-widest mt-1">Sincronização Cloud Completa</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js'
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js'
        import { getFirestore, collection, doc, onSnapshot, setDoc, deleteDoc, updateDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js'

        let db, auth, currentUser;
        let tasks = [];
        let currentFilter = 'all';
        let isCloudMode = false;
        const ACCESS_PASSWORD = "3c2026"; 

        if (window.Notification && Notification.permission !== "granted") {
            Notification.requestPermission();
        }

        const init = async () => {
            try {
                if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                    const firebaseConfig = JSON.parse(__firebase_config);
                    const app = initializeApp(firebaseConfig);
                    auth = getAuth(app);
                    db = getFirestore(app);
                    isCloudMode = true;

                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } else {
                        await signInAnonymously(auth);
                    }

                    onAuthStateChanged(auth, (user) => {
                        currentUser = user;
                        if (user) {
                            document.getElementById('user-id-text').innerText = `ID: ${user.uid.substring(0, 12)}`;
                            document.getElementById('status-dot').className = "w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse";
                            setupSync();
                        }
                    });
                } else {
                    useLocalMode();
                }
            } catch (err) {
                useLocalMode();
            }
        };

        function useLocalMode() {
            isCloudMode = false;
            document.getElementById('user-id-text').innerText = "OFFLINE DATABASE";
            document.getElementById('status-dot').className = "w-1.5 h-1.5 rounded-full bg-pink-500";
            const saved = localStorage.getItem('3c_tasks_v18');
            if (saved) tasks = JSON.parse(saved);
            renderTasks();
        }

        function setupSync() {
            const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
            const tasksCol = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks');
            onSnapshot(tasksCol, (snap) => {
                tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                tasks.sort((a, b) => b.createdAt - a.createdAt);
                renderTasks();
                document.getElementById('sync-time').innerText = new Date().toLocaleTimeString('pt-BR');
            });
        }

        window.checkPassword = () => {
            const input = document.getElementById('password-input');
            if(input.value === ACCESS_PASSWORD) {
                const lock = document.getElementById('lock-screen');
                const main = document.getElementById('main-content');
                lock.style.opacity = '0';
                setTimeout(() => {
                    lock.style.display = 'none';
                    main.classList.remove('hidden');
                    setTimeout(() => main.style.opacity = '1', 50);
                }, 700);
            } else {
                input.classList.add('shake');
                input.value = '';
                setTimeout(() => input.classList.remove('shake'), 400);
            }
        };

        window.deleteTask = async (id, isSub = false, pId = null) => {
            const taskId = id.toString();
            const parentId = pId ? pId.toString() : null;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                const taskDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', (parentId || taskId));
                if (isSub) {
                    const parentTask = tasks.find(t => t.id === parentId);
                    const updatedSubs = parentTask.subtasks.filter(s => s.id !== taskId);
                    await updateDoc(taskDocRef, { subtasks: updatedSubs });
                } else {
                    await deleteDoc(taskDocRef);
                    triggerToast("Eliminado");
                }
            } else {
                if (isSub) {
                    const parentTask = tasks.find(t => t.id === parentId);
                    parentTask.subtasks = parentTask.subtasks.filter(s => s.id !== taskId);
                } else {
                    tasks = tasks.filter(t => t.id !== taskId);
                    triggerToast("Eliminado");
                }
                saveLocal();
            }
        };

        window.toggleExpand = async (id) => {
            const taskId = id.toString();
            const task = tasks.find(t => t.id === taskId);
            if (!task) return;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', taskId), { expanded: !task.expanded });
            } else {
                task.expanded = !task.expanded;
                saveLocal();
            }
        };

        window.toggleTask = async (id, isSub = false, pId = null) => {
            const taskId = id.toString();
            const parentId = pId ? pId.toString() : null;
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                const taskDocRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', (parentId || taskId));
                if (isSub) {
                    const parentTask = tasks.find(t => t.id === parentId);
                    const updatedSubs = parentTask.subtasks.map(s => s.id === taskId ? { ...s, completed: !s.completed } : s);
                    await updateDoc(taskDocRef, { subtasks: updatedSubs });
                } else {
                    const task = tasks.find(t => t.id === taskId);
                    const newStatus = !task.completed;
                    const updatedSubs = (task.subtasks || []).map(s => ({ ...s, completed: newStatus }));
                    await updateDoc(taskDocRef, { completed: newStatus, subtasks: updatedSubs });
                }
            } else {
                if (isSub) {
                    const parentTask = tasks.find(t => t.id === parentId);
                    const sub = parentTask.subtasks.find(s => s.id === taskId);
                    sub.completed = !sub.completed;
                } else {
                    const task = tasks.find(t => t.id === taskId);
                    task.completed = !task.completed;
                    (task.subtasks || []).forEach(s => s.completed = task.completed);
                }
                saveLocal();
            }
        };

        window.addMainTask = async () => {
            const titleInput = document.getElementById('main-task-input');
            const descInput = document.getElementById('main-desc-input');
            const reminderInput = document.getElementById('reminder-input');
            const title = titleInput.value.trim();
            if (!title) return triggerToast("Defina a tarefa");
            const newTask = {
                text: title,
                description: descInput.value,
                priority: document.getElementById('priority-select').value,
                completed: false, expanded: true, createdAt: Date.now(),
                reminderAt: reminderInput.value ? new Date(reminderInput.value).getTime() : null,
                reminderSent: false, subtasks: []
            };
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', Date.now().toString()), newTask);
            } else {
                newTask.id = Date.now().toString();
                tasks.unshift(newTask);
                saveLocal();
            }
            titleInput.value = ''; descInput.value = ''; reminderInput.value = '';
            triggerToast("Tarefa Criada");
        };

        window.addSubTask = async (pId) => {
            const parentId = pId.toString();
            const val = document.getElementById(`sub-input-${parentId}`).value.trim();
            if (!val) return;
            const task = tasks.find(t => t.id === parentId);
            const subs = [...(task.subtasks || []), { id: Date.now().toString(), text: val, completed: false }];
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', parentId), { subtasks: subs });
            } else {
                task.subtasks = subs;
                saveLocal();
            }
            document.getElementById(`sub-input-${parentId}`).value = '';
        };

        window.setFilter = (filter) => {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('text-pink-500');
                btn.querySelector('span')?.remove();
            });
            event.target.classList.add('text-pink-500');
            event.target.insertAdjacentHTML('beforeend', '<span class="absolute -bottom-9 left-0 right-0 h-[3px] bg-pink-500 rounded-full"></span>');
            renderTasks();
        };

        function saveLocal() {
            localStorage.setItem('3c_tasks_v18', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            const empty = document.getElementById('empty-state');
            const filtered = tasks.filter(t => {
                if (currentFilter === 'pending') return !t.completed;
                if (currentFilter === 'completed') return t.completed;
                return true;
            });
            if (filtered.length === 0) { container.innerHTML = ''; empty.classList.remove('hidden'); } 
            else { empty.classList.add('hidden'); container.innerHTML = filtered.map(t => generateHTML(t)).join(''); }
            const total = tasks.length, concl = tasks.filter(x => x.completed).length;
            const p = total === 0 ? 0 : Math.round((concl / total) * 100);
            document.getElementById('stats-text').innerText = `${concl} DE ${total} TAREFAS FINALIZADAS`;
            document.getElementById('overall-progress').style.width = `${p}%`;
            document.getElementById('percent-display').innerText = `${p}%`;
            lucide.createIcons();
        }

        function generateHTML(t) {
            const subtasks = t.subtasks || [];
            const p = subtasks.length ? Math.round((subtasks.filter(s => s.completed).length / subtasks.length) * 100) : (t.completed ? 100 : 0);
            const diff = Math.floor(Math.abs(Date.now() - t.createdAt) / (1000 * 60 * 60 * 24));
            const statusClass = diff < 3 ? 'status-fresh' : diff < 6 ? 'status-stale' : 'status-critical';
            const isC = t.completed;
            const tagColor = `tag-${t.priority}`;
            const borderPrio = `priority-${t.priority}-border`;
            const reminderDate = t.reminderAt ? new Date(t.reminderAt).toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'}) : null;

            return `
                <div class="glass-card rounded-3xl overflow-hidden animate-task ${isC ? 'completed-task' : borderPrio}">
                    <div class="p-10 text-white">
                        <div class="flex items-start gap-10">
                            <button onclick="toggleTask('${t.id}')" class="mt-2 hover:scale-110 transition-transform active:scale-90">
                                <i data-lucide="${isC ? 'check-circle-2' : 'circle'}" class="w-10 h-10 ${isC ? 'text-emerald-500' : 'text-white/10'}"></i>
                            </button>
                            <div class="flex-grow text-white">
                                <div class="flex flex-wrap items-center gap-5 mb-5 text-white">
                                    <h3 class="font-black text-2xl uppercase tracking-tighter ${isC ? 'completed-text' : 'text-white'} text-white">${t.text}</h3>
                                    <span class="px-4 py-1 text-[9px] font-black uppercase tracking-[0.2em] rounded-full ${tagColor}">${t.priority}</span>
                                    ${reminderDate ? `
                                        <span class="flex items-center gap-2 px-3 py-1 bg-pink-500/10 text-pink-500 text-[9px] font-black uppercase tracking-widest rounded-full border border-pink-500/20">
                                            <i data-lucide="bell" class="w-3 h-3"></i> ${reminderDate}
                                        </span>
                                    ` : ''}
                                </div>
                                ${t.description ? `<p class="text-base text-gray-400 mb-8 max-w-4xl leading-relaxed text-left">${t.description}</p>` : ''}
                                <div class="flex flex-wrap items-center gap-12 text-white">
                                    <div class="flex items-center gap-3 text-[11px] font-bold text-gray-600 uppercase tracking-widest">
                                        <i data-lucide="calendar" class="w-4 h-4 text-white"></i> ${new Date(t.createdAt).toLocaleDateString('pt-BR')}
                                    </div>
                                    <div class="flex items-center gap-3 text-[11px] font-black uppercase tracking-[0.2em] ${statusClass}">
                                        <i data-lucide="clock-3" class="w-4 h-4"></i> ${diff === 0 ? 'CRIADO HOJE' : `${diff} DIAS EM ABERTO`}
                                    </div>
                                    ${subtasks.length > 0 ? `
                                        <div class="flex items-center gap-5 text-white">
                                            <div class="h-1.5 w-40 bg-black/40 rounded-full overflow-hidden border border-white/5 text-white">
                                                <div class="h-full bg-pink-500 shadow-[0_0_10px_rgba(236,72,153,0.5)] text-white" style="width: ${p}%"></div>
                                            </div>
                                            <span class="text-[11px] font-black text-pink-500 italic tracking-widest text-white">${p}% PERFORMANCE</span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                            <div class="flex items-center gap-4 text-white">
                                <button onclick="toggleExpand('${t.id}')" class="p-4 hover:bg-white/5 rounded-2xl transition-all">
                                    <i data-lucide="${t.expanded ? 'minus' : 'plus'}" class="w-6 h-6 text-gray-500"></i>
                                </button>
                                <button onclick="deleteTask('${t.id}')" class="p-4 hover:bg-red-500/20 rounded-2xl transition-all group">
                                    <i data-lucide="trash-2" class="w-6 h-6 text-gray-500 group-hover:text-red-500"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                    ${t.expanded ? `
                        <div class="bg-black/30 p-12 pt-8 space-y-8">
                            <div class="h-px bg-white/5"></div>
                            <div class="space-y-6 ml-14 relative text-white">
                                ${subtasks.map(s => `
                                    <div class="flex items-center gap-6 group relative">
                                        <div class="branch-line"></div>
                                        <div class="branch-node"></div>
                                        <button onclick="toggleTask('${s.id}', true, '${t.id}')" class="hover:scale-110 transition-transform active:scale-90 z-10 text-white">
                                            <i data-lucide="${s.completed ? 'check-square' : 'square'}" class="w-6 h-6 ${s.completed ? 'text-purple-500 shadow-[0_0_15px_rgba(168,85,247,0.3)]' : 'text-white/10'}"></i>
                                        </button>
                                        <span class="text-sm ${s.completed ? 'completed-text italic' : 'text-gray-300 font-bold'} flex-grow tracking-tight text-white">${s.text}</span>
                                        <button onclick="deleteTask('${s.id}', true, '${t.id}')" class="opacity-0 group-hover:opacity-100 transition-opacity">
                                            <i data-lucide="x" class="w-4 h-4 text-gray-700 hover:text-red-500"></i>
                                        </button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="ml-14 mt-10 flex gap-6 text-white text-white">
                                <input type="text" id="sub-input-${t.id}" placeholder="Ramificar ação..." 
                                    class="bg-transparent border-b border-white/10 text-base py-3 flex-grow focus:outline-none focus:border-pink-500 transition-all font-medium text-gray-400 text-white"
                                    onkeypress="if(event.key === 'Enter') addSubTask('${t.id}')">
                                <button onclick="addSubTask('${t.id}')" class="bg-white/5 p-4 rounded-2xl hover:bg-white/10 transition-all text-white text-white">
                                    <i data-lucide="plus" class="w-6 h-6 text-white text-white"></i>
                                </button>
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
        }

        // --- MONITOR DE LEMBRETES ---
        setInterval(() => {
            const now = new Date().getTime();
            tasks.forEach(task => {
                if (!task.completed && task.reminderAt && !task.reminderSent) {
                    if (now >= task.reminderAt) {
                        if (Notification.permission === "granted") {
                            new Notification(`Workflow 3C | Projeto MD`, {
                                body: `AGORA: ${task.text}`,
                                icon: 'https://i.ibb.co/TDvNpKbv/285535120-111261434935979-5560566145880188190-n.jpg'
                            });
                        }
                        markReminderAsSent(task.id);
                    }
                }
            });
        }, 60000);

        async function markReminderAsSent(taskId) {
            const tIdString = taskId.toString();
            if (isCloudMode && currentUser) {
                const appId = typeof __app_id !== 'undefined' ? __app_id : 'workflow-md-master-v2';
                await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'tasks', tIdString), { reminderSent: true });
            } else {
                const t = tasks.find(x => x.id === tIdString);
                if (t) t.reminderSent = true;
                saveLocal();
            }
        }

        function triggerToast(msg) {
            const t = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            t.classList.remove('translate-y-40', 'opacity-0');
            setTimeout(() => t.classList.add('translate-y-40', 'opacity-0'), 3500);
        }

        init();
    </script>
</body>
</html>
