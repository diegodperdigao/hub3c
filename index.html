<script type="module">
        // 1. CONFIGURAÇÕES INICIAIS
        let tasks = [];
        let editingId = null;
        let currentFilter = 'all';
        const ACCESS_PASSWORD = "3c2026"; 

        // --- SISTEMA DE ÁUDIO DINÂMICO ---
        window.playMemeSound = function(tituloTarefa = "") {
            try {
                window.speechSynthesis.cancel();
                const prefixos = [
                    "Vai trabalhar vagabundo! Você tem que ",
                    "Para de ser herdeiro e vai logo ",
                    "O boleto não se paga sozinho! Vai agora ",
                    "Larga esse celular e foca em ",
                    "Status de hoje: pobre! Anda logo e vai ",
                    "Seu futuro self está passando fome porque você não quer "
                ];

                const prefixoAleatorio = prefixos[Math.floor(Math.random() * prefixos.length)];
                const mensagemCompleta = prefixoAleatorio + (tituloTarefa || "fazer suas obrigações");
                const utterance = new SpeechSynthesisUtterance(mensagemCompleta);
                
                utterance.lang = "pt-BR";
                const voices = window.speechSynthesis.getVoices();
                const femaleVoice = voices.find(v => v.lang.includes('pt') && 
                    (v.name.toLowerCase().includes('maria') || v.name.toLowerCase().includes('luciana') || v.name.toLowerCase().includes('victoria')));
                
                if (femaleVoice) utterance.voice = femaleVoice;
                else utterance.pitch = 1.3;
                
                utterance.rate = 1.1;
                window.speechSynthesis.speak(utterance);
            } catch(e) { console.error(e); }
        }

        // --- FUNÇÕES DE INTERFACE ---
        window.checkPassword = () => {
            const input = document.getElementById('password-input');
            if(input.value === ACCESS_PASSWORD) {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('main-content').style.opacity = '1';
                renderTasks();
            } else {
                input.classList.add('shake');
                setTimeout(() => input.classList.remove('shake'), 400);
                input.value = '';
            }
        };

        window.addMainTask = () => {
            const titleInput = document.getElementById('main-task-input');
            const descInput = document.getElementById('main-desc-input');
            const priority = document.getElementById('priority-select').value;
            const reminderInput = document.getElementById('reminder-input');

            if (!titleInput.value.trim()) return;

            const newTask = {
                id: Date.now().toString(),
                text: titleInput.value,
                description: descInput.value,
                priority: priority,
                completed: false,
                createdAt: Date.now(),
                reminderAt: reminderInput.value ? new Date(reminderInput.value).getTime() : null,
                reminderSent: false
            };

            tasks.unshift(newTask);
            saveLocal();
            playMemeSound(newTask.text);
            titleInput.value = ''; descInput.value = ''; reminderInput.value = '';
        };

        window.toggleTask = (id) => {
            const t = tasks.find(x => x.id === id);
            if (t) t.completed = !t.completed;
            saveLocal();
        };

        window.deleteTask = (id) => {
            tasks = tasks.filter(x => x.id !== id);
            saveLocal();
        };

        window.startEdit = (id) => { editingId = id; renderTasks(); };
        window.saveEdit = (id) => {
            const t = tasks.find(x => x.id === id);
            t.text = document.getElementById(`edit-title-${id}`).value;
            t.description = document.getElementById(`edit-desc-${id}`).value;
            editingId = null;
            saveLocal();
        };

        window.setFilter = (f) => {
            currentFilter = f;
            renderTasks();
        };

        window.testAlert = () => playMemeSound("testar o sistema");

        function saveLocal() {
            localStorage.setItem('3c_tasks_v26', JSON.stringify(tasks));
            renderTasks();
        }

        function renderTasks() {
            const container = document.getElementById('task-list');
            const filtered = tasks.filter(t => 
                currentFilter === 'pending' ? !t.completed : 
                currentFilter === 'completed' ? t.completed : true
            );
            
            container.innerHTML = filtered.map(t => `
                <div class="glass-card rounded-2xl p-4 mb-4 border-l-4 ${t.completed ? 'opacity-40 border-gray-600' : (t.priority === 'high' ? 'border-pink-600' : 'border-cyan-600')}">
                    <div class="flex justify-between items-start">
                        <div class="flex gap-4">
                            <button onclick="toggleTask('${t.id}')">
                                <i data-lucide="${t.completed ? 'check-circle' : 'circle'}" class="w-6 h-6"></i>
                            </button>
                            <div>
                                ${editingId === t.id ? 
                                    `<input id="edit-title-${t.id}" class="bg-black/20 border border-white/10 rounded p-1 mb-2" value="${t.text}">` : 
                                    `<h3 class="font-bold uppercase ${t.completed ? 'line-through' : ''}">${t.text}</h3>`}
                                
                                ${editingId === t.id ? 
                                    `<textarea id="edit-desc-${t.id}" class="bg-black/20 border border-white/10 rounded p-1 w-full text-xs">${t.description}</textarea>` : 
                                    `<p class="text-xs text-gray-400">${t.description || ''}</p>`}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="playMemeSound('${t.text}')" class="p-1 hover:bg-white/10 rounded"><i data-lucide="volume-2" class="w-4 h-4 text-pink-500"></i></button>
                            ${editingId === t.id ? 
                                `<button onclick="saveEdit('${t.id}')"><i data-lucide="save" class="w-4 h-4 text-green-500"></i></button>` : 
                                `<button onclick="startEdit('${t.id}')"><i data-lucide="pencil" class="w-4 h-4 text-gray-500"></i></button>`}
                            <button onclick="deleteTask('${t.id}')"><i data-lucide="trash" class="w-4 h-4 text-red-800"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');

            // Atualiza progresso
            const total = tasks.length;
            const done = tasks.filter(x => x.completed).length;
            const p = total ? Math.round((done / total) * 100) : 0;
            document.getElementById('overall-progress').style.width = p + '%';
            document.getElementById('percent-display').innerText = p + '%';
            
            lucide.createIcons();
        }

        // --- INICIALIZAÇÃO ---
        window.addEventListener('load', () => {
            const saved = localStorage.getItem('3c_tasks_v26');
            if (saved) tasks = JSON.parse(saved);
            
            // Corrige o bug do Lucide que às vezes não carrega ícones dinâmicos
            setTimeout(() => lucide.createIcons(), 500);
        });

        // Checagem de Lembretes
        setInterval(() => {
            const now = Date.now();
            tasks.forEach(t => {
                if (!t.completed && t.reminderAt && !t.reminderSent && now >= t.reminderAt) {
                    t.reminderSent = true;
                    playMemeSound(t.text);
                    alert("🚨 HORA DE TRABALHAR: " + t.text);
                    saveLocal();
                }
            });
        }, 5000);
    </script>
